name: Python CI

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x" # Removed the dash here; 'with' takes key-value pairs

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest     # Removed the dash here; 'run' takes a block of text

      - name: Run tests
        run: pytest